# Agent 评估平台（step2_2）— GitLab CI
# Runner：Docker executor（学校）或本机 Shell（无 Docker）；本机 Shell 请用 Git Bash（见 ci/gitlab-runner-shell-windows.toml.example）
# 与项目 Runner #590（仅 tag: linux）及共享 Runner（docker+linux）对齐；本机 Runner 同样打 tag: linux 即可接同一套 job
# 国内网络：npm / pip / Docker 基础镜像已走镜像源；Shell executor 会忽略 image，依赖机子预装 Node 与 Python

default:
  interruptible: true
  tags:
    - linux

stages:
  - build

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  # 国内 npm 镜像（npmmirror，原淘宝源）
  NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
  # 国内 PyPI（减轻 pip install 超时/失败；Shell executor 同样生效）
  PIP_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
  PIP_TRUSTED_HOST: "pypi.tuna.tsinghua.edu.cn"

eval:frontend:
  stage: build
  # DaoCloud 同步的 Docker Hub 官方镜像，减轻国内拉取失败/超时（executor=docker 时生效）
  image: docker.m.daocloud.io/library/node:20-bookworm-slim
  cache:
    key:
      files:
        - step2_2/frontend/package-lock.json
    paths:
      - .npm/
  script:
    - cd step2_2/frontend
    - npm ci
    - npm run build

eval:backend:
  stage: build
  image: docker.m.daocloud.io/library/python:3.12-bookworm
  cache:
    key:
      files:
        - step2_2/backend/requirements.txt
    paths:
      - .cache/pip/
  script:
    - cd step2_2/backend
    - python -m venv .venv-ci
    # Linux venv: .venv-ci/bin/python；Windows venv: .venv-ci/Scripts/python.exe（Shell executor 无 Docker 时用后者）
    - |
      set -e
      if [ -x .venv-ci/bin/python ]; then PY=.venv-ci/bin/python
      elif [ -x .venv-ci/Scripts/python.exe ]; then PY=.venv-ci/Scripts/python.exe
      else echo "venv python not found" >&2; exit 1; fi
      "$PY" -m pip install -U pip wheel
      "$PY" -m pip install -r requirements.txt
      "$PY" -m compileall -q app
