stages:
  - verify
  - build
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - aicoding_ts/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH
      changes:
        - aicoding_ts/**/*
        - .gitlab-ci.yml
    - when: never

variables:
  NODE_VERSION: "20"
  AICODING_DIR: "aicoding_ts"

cache:
  key: "${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}"
  paths:
    - aicoding_ts/node_modules/
    - aicoding_ts/apps/web/dist/

default:
  image: node:${NODE_VERSION}
  before_script:
    - cd "$AICODING_DIR"
    - npm ci

verify:aicoding_ts:
  stage: verify
  script:
    - npm run lint
    - npm run typecheck

build:aicoding_ts:
  stage: build
  script:
    - npm run build:web
  artifacts:
    expire_in: 7 days
    paths:
      - aicoding_ts/apps/web/dist/

# Backend deployment expects a long-running Node service on a server.
# Configure these CI/CD variables in GitLab before enabling the deploy job:
# - DEPLOY_HOST
# - DEPLOY_USER
# - DEPLOY_SSH_KEY (private key)
# - DEPLOY_PATH (example: /opt/software3/aicoding_ts)
deploy:backend:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - aicoding_ts/server.ts
        - aicoding_ts/apps/runtime/**/*
        - aicoding_ts/packages/**/*
        - aicoding_ts/public/**/*
        - aicoding_ts/apps/**/*
        - aicoding_ts/package.json
        - aicoding_ts/tsconfig.json
        - .gitlab-ci.yml
  needs:
    - verify:aicoding_ts
    - build:aicoding_ts
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - rsync -az --delete aicoding_ts/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && npm ci && npm run build:web && pm2 restart software3 || pm2 start server.ts --name software3 --interpreter node --node-args='--experimental-strip-types'"

deploy:frontend:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - aicoding_ts/apps/web/**/*
        - aicoding_ts/public/**/*
        - aicoding_ts/package.json
        - aicoding_ts/apps/web/tsconfig.build.json
        - .gitlab-ci.yml
  needs:
    - build:aicoding_ts
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - rsync -az --delete aicoding_ts/apps/web/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_FRONTEND_PATH/"
