<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>命令白名单 · AI Coding Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="mcp-config-page">
      <header class="mcp-config-header">
        <div>
          <p class="eyebrow">Command Safety</p>
          <h1>命令白名单</h1>
          <p class="muted">命中白名单的命令直接执行;否则在任务运行时弹出确认。在命令确认弹窗里也可一键加入这里。</p>
        </div>
        <a class="ghost-button" href="/">返回主界面</a>
      </header>

      <section class="panel mcp-config-panel">
        <div class="panel-header">
          <div>
            <h2>添加规则</h2>
            <span class="muted">完全匹配 / 前缀匹配 / 命令名 三种规则</span>
          </div>
          <button id="refreshWhitelistBtn" type="button">刷新</button>
        </div>
        <form id="whitelistAddForm" class="whitelist-add-form">
          <input id="whitelistPatternInput" type="text" placeholder="例如 npm test 或 npm run" autocomplete="off" />
          <select id="whitelistMatchTypeSelect">
            <option value="exact">完全匹配</option>
            <option value="prefix">前缀匹配</option>
            <option value="command">命令名</option>
          </select>
          <button type="submit" class="ghost-button">添加</button>
        </form>
      </section>

      <section class="panel mcp-config-panel">
        <div class="panel-header">
          <div>
            <h2>已生效规则</h2>
            <span id="whitelistStatus" class="muted">加载中…</span>
          </div>
        </div>
        <div id="whitelistList" class="version-list"></div>
      </section>
    </div>

    <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/whitelist.js"></script>
  </body>
</html>
