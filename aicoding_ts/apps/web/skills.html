<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill 管理 · AI Coding Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="mcp-config-page">
      <header class="mcp-config-header">
        <div>
          <p class="eyebrow">Skills</p>
          <h1>Skill 管理</h1>
          <p class="muted">查看内置 / 项目 / 导入的 Skill,管理启用状态、查看能力依赖,或从本地目录/粘贴内容导入新的 Skill。</p>
        </div>
        <a class="ghost-button" href="/">返回主界面</a>
      </header>

      <section class="panel mcp-config-panel">
        <div class="panel-header">
          <div>
            <h2>已注册 Skill</h2>
            <span id="skillStatus" class="muted">加载中…</span>
          </div>
          <div class="skill-header-actions">
            <button id="importSkillBtn" type="button" class="ghost-button">导入</button>
            <button id="refreshSkillsBtn" type="button">刷新</button>
          </div>
        </div>
        <div id="skillList" class="version-list"></div>
      </section>
    </div>

    <div id="skillImportOverlay" class="tree-dialog-overlay" aria-hidden="true">
      <div class="tree-dialog skill-import-dialog">
        <h3>导入 Skill</h3>
        <div class="skill-import-tabs">
          <label><input type="radio" name="skillImportMode" value="local_path" checked> 本地目录</label>
          <label><input type="radio" name="skillImportMode" value="workspace_path"> 项目路径</label>
          <label><input type="radio" name="skillImportMode" value="inline_markdown"> 粘贴内容</label>
        </div>
        <label class="tree-dialog-field" id="skillImportPathField">
          <span>路径</span>
          <input id="skillImportPathInput" type="text" placeholder="D:\external-skills\my-skill">
        </label>
        <label class="tree-dialog-field" id="skillImportNameField">
          <span>Skill 名称</span>
          <input id="skillImportNameInput" type="text" placeholder="my-skill">
        </label>
        <label class="tree-dialog-field" id="skillImportContentField">
          <span>SKILL.md</span>
          <textarea id="skillImportContentInput" rows="10" placeholder="---&#10;name: my-skill&#10;description: Use when...&#10;---"></textarea>
        </label>
        <div id="skillImportReport" class="skill-import-report">尚未预检查</div>
        <div class="tree-dialog-actions">
          <button id="skillImportPreviewBtn" type="button" class="ghost-button">预检查</button>
          <button id="skillImportConfirmBtn" type="button" class="primary-button" disabled>确认导入</button>
          <button id="skillImportCloseBtn" type="button" class="ghost-button">取消</button>
        </div>
      </div>
    </div>

    <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/skills.js"></script>
  </body>
</html>
